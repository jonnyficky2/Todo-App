<!DOCTYPE html>
<html>

<head>
  <meta name="theme-color" content="#181818">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.jpg">
<meta name="application-name" content="Daily Tracker">
<link rel="apple-touch-icon" sizes="192x192" href="icon.jpg">
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<meta name="mobile-web-app-capable" content="yes">

  <title>Daily Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Daily Tracker</h1>

<!-- LEVEL -->
<div id="levelBox">

  <h2 id="levelText">
    🏆 Level 1
  </h2>

  <div class="xp-bar">
    <div id="xpFill"></div>
  </div>

  <p id="xpText">
    0 / 100 XP
  </p>

</div>

<!-- TOP BUTTON -->
<div class="toolbar">

  <button onclick="undo()">↩ Undo</button>

  <button onclick="redo()">↪ Redo</button>

  <button id="themeToggle">
    🌙 Dark Mode
  </button>

</div>

<!-- BACKUP -->
<div class="backup-box">

  <button onclick="exportData()">
    📤 Export
  </button>

  <input
    type="file"
    id="importFile"
    accept=".json"
    onchange="importData(event)"
    hidden>

  <button onclick="
    document
    .getElementById('importFile')
    .click()
  ">
    📥 Import
  </button>

</div>

<!-- SEARCH -->
<div class="search-box">

  <input
    type="text"
    id="searchInput"
    placeholder="Cari task..."
    oninput="searchTask()">

</div>

<!-- FILTER -->
<div class="filter-box">

  <button onclick="setFilter('all')">
    All
  </button>

  <button onclick="setFilter('pending')">
    Pending
  </button>

  <button onclick="setFilter('done')">
    Done
  </button>

</div>

<h2 id="streakText">
  🔥 Streak: 0 hari
</h2>

<!-- ADD CATEGORY -->
<div class="add-box">

  <input
    type="text"
    id="categoryInput"
    placeholder="Tambah category">

  <button onclick="addCategory()">
    Tambah
  </button>

</div>

<!-- QUOTE -->
<div id="quoteContainer">

  <p id="quoteText">
    "Loading wisdom..."
  </p>

  <small id="quoteAuthor">
    - Philosopher
  </small>

</div>

<!-- HOME -->
<div id="homeSection">
  <p id="saveStatus">✔ Data tersimpan</p>

  <div id="container"></div>

  <h2>📅 Activity</h2>

  <div id="heatmap"></div>

</div>

<!-- CALENDAR -->
<div id="calendarSection">

  <h2>📅 Calendar View</h2>

  <div class="calendar-header">

    <button onclick="changeMonth(-1)">
      ⬅
    </button>

    <h3 id="calendarMonth"></h3>

    <button onclick="changeMonth(1)">
      ➡
    </button>

  </div>

  <div id="calendarGrid"></div>
  <div id="calendarView"></div>

</div>

<!-- HABIT -->
<div id="habitSection">

  <h2>🎯 Habit Tracker</h2>

  <div class="habit-box">

    <input
      type="text"
      id="habitInput"
      placeholder="Tambah habit">

    <button onclick="addHabit()">
      Tambah
    </button>

  </div>

  <div id="habitContainer"></div>

</div>

<!-- STATS -->
<div id="statsSection">

  <canvas id="statsChart"></canvas>

</div>

<!-- FLOAT BUTTON -->
<button id="floatingAddBtn">
  +
</button>

<!-- BOTTOM NAV -->
<div id="bottomNav">

  <button onclick="showSection('home')">
    🏠
  </button>

  <button onclick="showSection('calendar')">
    📅
  </button>

  <button onclick="showSection('habit')">
    🔥
  </button>

  <button onclick="showSection('stats')">
    📊
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("./sw.js")
      .then(() => console.log("SW OK"))
      .catch(err => console.log(err));
  });
}
</script>


</body>
</html>
